name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/srdatalog/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/srdatalog/**'
  workflow_dispatch:

# Single concurrent deploy — later pushes cancel earlier in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          # We install srdatalog itself so autodoc2 can import the package.
          # The wheel would need CUDA headers (see toolchain requirements);
          # for docs we only need the .py sources on sys.path, which is
          # exactly what -e . (with no build step) gives us via the
          # src/ layout declared in pyproject.
          pip install -e '.[docs]'

      - name: Build HTML
        run: |
          sphinx-build -W --keep-going -b html docs docs/_build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
