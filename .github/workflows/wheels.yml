name: Build wheels

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/populate_vendor.py'
      - 'pyproject.toml'
      - '.github/workflows/wheels.yml'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # populate_vendor.py downloads boost/highway/RMM/spdlog into
          # vendor/ inside the cibuildwheel container before each
          # python build. ~30s per Python version; reused across
          # subsequent builds in the same container.
          CIBW_BEFORE_BUILD: "python {project}/scripts/populate_vendor.py"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

