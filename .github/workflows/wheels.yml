name: Build wheels

# Trimmed to match what we actually support today:
#   - Linux x86_64 (CUDA target, all integration tests + doop benchmarks)
# Expanded when justified:
#   - Linux aarch64: add when we have an aarch64 integration test
#     (NVIDIA Jetson / Grace would be the driver).
#   - macOS (x86_64, arm64): add when the CPU-only engine lands — macOS
#     has no CUDA toolkit since 11.6, so a GPU-path wheel there would
#     ship broken artifacts.
#   - Windows: no build config today, no demand signal.
# Also: PR trigger stays off; wheels run on release tags + manual dispatch.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # populate_vendor.py downloads boost/highway/RMM/spdlog into
          # vendor/ inside the cibuildwheel container before each
          # python build. ~30s per Python version; reused across
          # subsequent builds in the same container.
          CIBW_BEFORE_BUILD: "python {project}/scripts/populate_vendor.py"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  # Publish on tag pushes — comment in once PyPI credentials are wired.
